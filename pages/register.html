<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Crear cuenta — Lele Oficial</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../js/theme.js"></script>
</head>
<body class="font-['Inter'] min-h-screen flex items-center justify-center">
  <div class="absolute inset-0 bg-gradient-to-br from-cyan-900/20 via-transparent to-violet-900/20"></div>

  <div class="relative z-10 w-full max-w-md mx-6">
    <div class="flex items-center justify-between mb-8">
      <a href="../index.html" class="flex flex-col justify-center group transition-transform hover:scale-105">
        <div class="text-2xl md:text-[28px] font-black tracking-tighter leading-none flex items-center gap-1.5 drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
          <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-fuchsia-300 bg-clip-text text-transparent">LELE</span>
          <span class="text-cyan-400 font-normal tracking-tight drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">OFICIAL</span>
        </div>
        <span class="text-[10px] font-semibold tracking-[0.25em] text-white/40 mt-1 uppercase pl-0.5">Diseño y Optimizaciones</span>
      </a>
      <div id="themeToggleContainer"></div>
    </div>

    <div class="p-8 rounded-2xl glass">
      <h1 class="text-2xl font-bold mb-2">Crear cuenta</h1>
      <p class="text-white/40 text-sm mb-8">Únete y empieza a crear</p>

      <div id="g_id_onload"
           data-client_id="835547393237-c0n1nfmf8e15gjugisqcgba3bqcq4gi6.apps.googleusercontent.com"
           data-auto_prompt="false"
           data-callback="handleGoogleRegister">
      </div>
      <div class="flex justify-center mb-6">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-locale="es"
             data-width="280">
        </div>
      </div>

      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t" style="border-color: var(--border-color);"></div></div>
        <div class="relative flex justify-center"><span class="px-4 text-xs text-white/30" style="background: var(--bg-primary);">o con email</span></div>
      </div>

      <form class="space-y-5" onsubmit="return false;">
        <div><label class="text-sm font-medium text-white/60 block mb-2">Nombre completo</label>
          <input id="regName" type="text" placeholder="Tu nombre" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <div><label class="text-sm font-medium text-white/60 block mb-2">Correo electrónico</label>
          <input id="regEmail" type="email" placeholder="tu@correo.com" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <div><label class="text-sm font-medium text-white/60 block mb-2">Contraseña</label>
          <input id="regPassword" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <div><label class="text-sm font-medium text-white/60 block mb-2">Confirmar contraseña</label>
          <input id="regConfirm" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <button type="submit" id="regBtn" class="w-full py-3 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/25">Crear cuenta</button>
      </form>
      <p class="text-center text-sm text-white/40 mt-6">¿Ya tienes cuenta? <a href="login.html" class="text-violet-400 hover:text-violet-300 transition font-medium">Inicia sesión</a></p>
      <div class="flex justify-center gap-4 mt-4 text-xs text-white/30">
        <a href="privacidad.html" class="hover:text-white/50 transition">Privacidad</a>
        <a href="terminos.html" class="hover:text-white/50 transition">Términos</a>
      </div>
    </div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      leleTheme.applySavedTheme();
      const tc = document.getElementById('themeToggleContainer');
      if (tc && !tc.querySelector('.theme-toggle')) tc.appendChild(leleTheme.createToggle());

      document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        const btn = document.getElementById('regBtn');
        const orig = btn.textContent;

        if (!name || !email || !pass) { btn.textContent = 'Completa todos los campos'; setTimeout(() => { btn.textContent = orig; }, 2000); return; }
        if (pass.length < 6) { btn.textContent = 'Mínimo 6 caracteres'; setTimeout(() => { btn.textContent = orig; }, 2000); return; }
        if (pass !== confirm) { btn.textContent = 'Las contraseñas no coinciden'; setTimeout(() => { btn.textContent = orig; }, 2000); return; }

        btn.textContent = 'Creando cuenta...';
        btn.disabled = true;

        try {
          const sb = getSupabaseClient();
          if (sb) {
            const { data, error } = await sb.auth.signUp({
              email, password: pass,
              options: { data: { full_name: name } }
            });
            if (error) {
              btn.textContent = error.message;
              setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 3000);
              return;
            }
          }
          localStorage.setItem('lele_user', JSON.stringify({ name, email, picture: '' }));
          window.location.href = 'dashboard.html';
        } catch (_) {
          btn.textContent = 'Error de conexión';
          setTimeout(() => { btn.textContent = orig; btn.disabled = false; }, 2000);
        }
      });
    });
  </script>
</body>
</html>
