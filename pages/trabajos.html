<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galería — Lele Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/theme.js"></script>
</head>
<body class="font-['Inter']">

  <!-- NAVBAR -->
  <nav class="fixed top-0 w-full z-50 backdrop-blur-xl border-b" style="background: rgba(10,10,15,0.7); border-color: var(--border-color);">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex flex-col justify-center group transition-transform hover:scale-105">
        <div class="text-2xl md:text-[28px] font-black tracking-tighter leading-none flex items-center gap-1.5 drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
          <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-fuchsia-300 bg-clip-text text-transparent">LELE</span>
          <span class="text-cyan-400 font-normal tracking-tight drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">OFICIAL</span>
        </div>
        <span class="text-[10px] font-semibold tracking-[0.25em] text-white/40 mt-1 uppercase pl-0.5">Diseño y Optimizaciones</span>
      </a>
      <div class="flex items-center gap-4">
        <div id="themeToggleContainer"></div>
        <a href="../index.html" class="text-sm text-white/60 hover:text-white transition">← Volver</a>
      </div>
    </div>
  </nav>

  <main class="pt-32 pb-20 px-6 max-w-7xl mx-auto">
    <div class="text-center mb-16">
      <span class="text-xs uppercase tracking-[0.2em] text-violet-400 font-semibold">Portafolio</span>
      <h1 class="text-4xl md:text-5xl font-black mt-4">Galería de trabajos</h1>
      <p class="text-white/40 mt-4 max-w-xl mx-auto">Todos nuestros proyectos en un solo lugar</p>
    </div>

    <!-- Filtros -->
    <div class="flex flex-wrap justify-center gap-3 mb-12">
      <button data-filter="all" class="filter-btn px-5 py-2 rounded-full bg-violet-600/20 border border-violet-500/50 text-white text-sm font-medium transition-all">Todos</button>
      <button data-filter="IA" class="filter-btn px-5 py-2 rounded-full glass-hover text-sm text-white/60 hover:text-white transition-all">IA</button>
      <button data-filter="Animación" class="filter-btn px-5 py-2 rounded-full glass-hover text-sm text-white/60 hover:text-white transition-all">Animación</button>
      <button data-filter="Web" class="filter-btn px-5 py-2 rounded-full glass-hover text-sm text-white/60 hover:text-white transition-all">Web</button>
      <button data-filter="Flyer" class="filter-btn px-5 py-2 rounded-full glass-hover text-sm text-white/60 hover:text-white transition-all">Flyer</button>
      <button data-filter="TikTok" class="filter-btn px-5 py-2 rounded-full glass-hover text-sm text-white/60 hover:text-white transition-all">TikTok</button>
    </div>

    <!-- Grid -->
    <div id="galleryGrid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full text-center text-white/30 py-20" id="emptyMessage">
        ⏳ Cargando trabajos...
      </div>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-[60] bg-black/80 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-300 p-4">
    <button id="lightboxClose" class="absolute top-6 right-6 w-10 h-10 rounded-full bg-white/10 text-white text-xl hover:bg-white/20 transition">&times;</button>
    <img id="lightboxImg" class="max-w-full max-h-[85vh] rounded-2xl shadow-2xl" src="" alt="">
    <div id="lightboxInfo" class="absolute bottom-6 left-1/2 -translate-x-1/2 text-white text-sm bg-black/50 px-6 py-3 rounded-full backdrop-blur-md"></div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-db.js"></script>
  <script src="../js/main.js"></script>
  <script>
    // ─── Cargar trabajos desde Supabase / localStorage ──
    async function loadGallery(filter = 'all') {
      const grid = document.getElementById('galleryGrid');
      const works = await dbGetWorks();
      _currentWorks = works;

      if (works.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center text-white/30 py-20">
          <span class="text-5xl block mb-4">🎨</span>
          No hay trabajos publicados todavía.<br>
          <span class="text-sm text-white/20">Los trabajos aparecerán aquí cuando el admin los publique.</span>
        </div>`;
        return;
      }

      const filtered = filter === 'all' ? works : works.filter(w => w.category === filter);

      if (filtered.length === 0) {
        grid.innerHTML = `<div class="col-span-full text-center text-white/30 py-20">Sin resultados para esta categoría</div>`;
        return;
      }

      grid.innerHTML = filtered.map((work, i) => `
        <div class="group relative rounded-2xl overflow-hidden border border-white/[0.06] bg-white/[0.02] cursor-pointer hover:border-violet-500/30 transition-all duration-500" onclick="openLightbox(${i}, '${filter}')">
          <div class="aspect-[4/3] w-full" style="background: ${work.image}; background-size: cover; background-position: center;"></div>
          <div class="absolute inset-0 bg-gradient-to-t from-[#0a0a0f] via-transparent to-transparent opacity-0 group-hover:opacity-100 transition-all duration-300">
            <div class="absolute bottom-0 left-0 right-0 p-5">
              <span class="inline-block px-3 py-1 rounded-full bg-violet-500/20 text-violet-300 text-xs font-medium mb-2">${work.category}</span>
              <h4 class="text-white font-semibold text-sm">${work.title}</h4>
              <p class="text-white/50 text-xs mt-1">${work.description || ''}</p>
            </div>
          </div>
        </div>
      `).join('');
    }

    // ─── Lightbox ──────────────────────────────────────
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightboxImg');
    const lightboxInfo = document.getElementById('lightboxInfo');
    let _currentWorks = [];

    function openLightbox(index, filter) {
      const filtered = filter === 'all' ? _currentWorks : _currentWorks.filter(w => w.category === filter);
      const work = filtered[index];
      if (!work) return;
      lightboxImg.style.background = work.image;
      lightboxImg.style.backgroundSize = 'cover';
      lightboxImg.style.backgroundPosition = 'center';
      lightboxImg.removeAttribute('src');
      lightboxInfo.textContent = `${work.title} — ${work.category}`;
      lightbox.classList.remove('opacity-0', 'pointer-events-none');
    }

    document.getElementById('lightboxClose').addEventListener('click', () => {
      lightbox.classList.add('opacity-0', 'pointer-events-none');
    });
    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) lightbox.classList.add('opacity-0', 'pointer-events-none');
    });

    // ─── Filtros ───────────────────────────────────────
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => {
          b.classList.remove('bg-violet-600/20', 'border-violet-500/50', 'text-white');
          b.classList.add('text-white/60');
        });
        btn.classList.add('bg-violet-600/20', 'border-violet-500/50', 'text-white');
        btn.classList.remove('text-white/60');
        loadGallery(btn.dataset.filter);
      });
    });

    // ─── Init ──────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', () => {
      leleTheme.applySavedTheme();
      document.getElementById('themeToggleContainer')?.appendChild(leleTheme.createToggle());
      loadGallery();
    });
  </script>
</body>
</html>
