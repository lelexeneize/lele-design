<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Descargar — Sabina Optimizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="../js/supabase-config.js"></script>
</head>
<body class="font-['Inter']">
  <nav class="fixed top-0 w-full z-50 backdrop-blur-xl border-b border-white/[0.06]" style="background: rgba(10,10,15,0.7);">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex flex-col justify-center group transition-transform hover:scale-105">
        <div class="text-2xl md:text-[28px] font-black tracking-tighter leading-none flex items-center gap-1.5 drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
          <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-fuchsia-300 bg-clip-text text-transparent">LELE</span>
          <span class="text-cyan-400 font-normal tracking-tight drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">OFICIAL</span>
        </div>
        <span class="text-[10px] font-semibold tracking-[0.25em] text-white/40 mt-1 uppercase pl-0.5">Diseño y Optimizaciones</span>
      </a>
    </div>
  </nav>

  <main class="min-h-screen flex items-center justify-center px-6 pt-16">
    <div class="w-full max-w-lg">

      <!-- Input -->
      <div id="keyScreen" class="text-center">
        <div class="text-5xl mb-6">🔑</div>
        <h1 class="text-3xl md:text-4xl font-black mb-2 text-white">Descargar Sabina Optimizer</h1>
        <p class="text-white/40 text-sm mb-8">Ingresá tu license key para descargar la app</p>
        <div class="p-6 rounded-2xl glass">
          <input id="keyInput" type="text" placeholder="ES-XXXXXX-XXXXXX-XXXXXX-XXXXXX" class="w-full px-4 py-3 rounded-xl input-theme text-sm text-center font-mono focus:outline-none focus:border-violet-500/50 transition-all mb-4 uppercase">
          <button id="validateBtn" onclick="validateKey()" class="w-full py-3 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/25">
            <i class="fas fa-shield-alt mr-2"></i> Validar clave
          </button>
          <p id="keyError" class="text-red-400 text-sm mt-3 hidden"></p>
        </div>
      </div>

      <!-- Download -->
      <div id="downloadScreen" class="text-center hidden">
        <div class="text-5xl mb-6">✅</div>
        <h1 class="text-3xl md:text-4xl font-black mb-2 text-white">Clave válida</h1>
        <p class="text-white/40 text-sm mb-2" id="planName">Plan Essential</p>
        <p class="text-white/30 text-xs mb-8 font-mono" id="displayKey">ES-XXXXXX-XXXXXX-XXXXXX-XXXXXX</p>
        <div class="p-6 rounded-2xl glass mb-6">
          <p class="text-sm text-white/50 mb-4"><i class="fas fa-download mr-2"></i>Tu descarga está lista:</p>
          <a href="https://github.com/lelexeneize/lele-design/raw/main/optimizer-app/SabinaOptimizer.exe" class="inline-flex items-center gap-2 px-8 py-4 rounded-full bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-500 hover:to-teal-500 text-white font-bold text-sm transition-all shadow-lg shadow-emerald-600/25">
            <i class="fas fa-file-archive"></i> Descargar Sabina Optimizer
          </a>
          <p class="text-white/20 text-xs mt-4"><i class="fas fa-info-circle"></i> Ejecutá como Administrador después de descargar</p>
        </div>
        <a href="optimizer.html" class="text-sm text-white/40 hover:text-white transition">← Volver</a>
      </div>

    </div>
  </main>

  <script>
    async function validateKey() {
      const input = document.getElementById('keyInput');
      const err = document.getElementById('keyError');
      const btn = document.getElementById('validateBtn');

      if (!input.value.trim()) {
        err.textContent = 'Ingresá una license key';
        err.classList.remove('hidden');
        return;
      }

      err.classList.add('hidden');
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Validando...';

      try {
        const sb = getSupabaseClient();
        if (!sb) { throw new Error('Sin conexión'); }

        const { data, error } = await sb.rpc('validate_key', { p_key: input.value.trim().toUpperCase() });

        if (error) {
          err.textContent = 'Error de validación. Intentalo de nuevo.';
          err.classList.remove('hidden');
          return;
        }

        if (!data || data.length === 0) {
          err.textContent = '❌ Clave inválida o no encontrada';
          err.classList.remove('hidden');
          return;
        }

        const keyData = data[0];
        if (keyData.status !== 'active') {
          err.textContent = '❌ Clave ' + keyData.status;
          err.classList.remove('hidden');
          return;
        }

        const planNames = { essential: 'Plan Essential', pro: 'Plan Pro', elite: 'Plan Elite' };
        document.getElementById('planName').textContent = planNames[keyData.plan] || keyData.plan;
        document.getElementById('displayKey').textContent = keyData.key;
        document.getElementById('keyScreen').classList.add('hidden');
        document.getElementById('downloadScreen').classList.remove('hidden');

      } catch (e) {
        err.textContent = 'Error de conexión. Verificá tu internet.';
        err.classList.remove('hidden');
      }

      btn.disabled = false;
      btn.innerHTML = '<i class="fas fa-shield-alt mr-2"></i> Validar clave';
    }

    document.getElementById('keyInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') validateKey();
    });
  </script>
</body>
</html>
