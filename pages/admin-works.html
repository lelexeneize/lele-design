<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Galería — Lele Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/theme.js"></script>
</head>
<body class="font-['Inter']">

  <!-- SIDEBAR -->
  <div class="fixed left-0 top-0 bottom-0 w-64 sidebar-theme border-r p-6 hidden lg:flex flex-col z-50" style="background: var(--bg-primary);">
    <a href="../index.html" class="text-xl font-black tracking-tight mb-10">
      <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">LELE</span>
      <span class="opacity-70 font-light">Design</span>
      <span class="block text-[10px] uppercase tracking-[0.2em] text-amber-400 font-semibold">Admin</span>
    </a>
    <nav class="flex-1 space-y-1">
      <a href="admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white hover:bg-white/[0.04] text-sm transition-all"><span>👥</span> Usuarios</a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-600/20 text-amber-300 text-sm font-medium"><span>🖼️</span> Galería</a>
      <a href="admin-licenses.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white hover:bg-white/[0.04] text-sm transition-all"><span>🔑</span> Licencias</a>
    </nav>
    <div class="pt-6 border-t border-white/[0.06] space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white text-sm transition-all"><span>←</span> Volver</a>
      <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-red-400 text-sm transition-all"><span>🚪</span> Cerrar sesión</a>
    </div>
  </div>

  <!-- Main -->
  <div class="lg:pl-64">
    <header class="h-16 border-b flex items-center justify-between px-6 lg:px-10" style="border-color: var(--border-color);">
      <div class="flex items-center gap-4">
        <button id="menuBtn" class="lg:hidden text-xl">☰</button>
        <h2 class="text-lg font-bold">Administrar Galería</h2>
      </div>
      <div class="flex items-center gap-4">
        <div id="themeToggleContainer"></div>
        <span class="text-sm text-white/40">Hola, <span id="userGreeting" class="font-medium">Admin</span></span>
      </div>
    </header>

    <main class="p-6 lg:p-10 space-y-8">

      <!-- Upload form -->
      <div class="p-8 rounded-2xl glass max-w-2xl">
        <h3 class="text-lg font-bold mb-1">Agregar trabajo</h3>
        <p class="text-sm opacity-40 mb-6">Subí un nuevo trabajo a la galería pública</p>
        <form id="workForm" class="space-y-4">
          <div>
            <label class="text-sm font-medium opacity-60 block mb-1.5">Título</label>
            <input id="workTitle" type="text" placeholder="Ej: Branding IA - Serie Onírica" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all">
          </div>
          <div>
            <label class="text-sm font-medium opacity-60 block mb-1.5">Descripción (opcional)</label>
            <input id="workDesc" type="text" placeholder="Breve descripción del trabajo" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all">
          </div>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="text-sm font-medium opacity-60 block mb-1.5">Categoría</label>
              <select id="workCategory" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all">
                <option value="IA">IA</option>
                <option value="Animación">Animación</option>
                <option value="Web">Web</option>
                <option value="Flyer">Flyer</option>
                <option value="TikTok">TikTok</option>
              </select>
            </div>
            <div>
              <label class="text-sm font-medium opacity-60 block mb-1.5">Color de fondo</label>
              <input id="workColor" type="color" value="#7c3aed" class="w-full h-[42px] rounded-xl input-theme cursor-pointer">
            </div>
          </div>
          <div>
            <label class="text-sm font-medium opacity-60 block mb-1.5">Imagen (subí un archivo o usá fondo degradado)</label>
            <input id="workImageInput" type="file" accept="image/*" class="w-full text-sm opacity-60 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-medium file:bg-violet-600/20 file:text-violet-300 hover:file:bg-violet-600/30 transition-all">
          </div>
          <div class="flex items-center gap-4 pt-2">
            <button type="submit" class="px-8 py-3 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/25">
              Publicar trabajo
            </button>
            <span id="uploadStatus" class="text-sm opacity-40"></span>
          </div>
        </form>
      </div>

      <!-- Works list -->
      <div>
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold">Trabajos publicados</h3>
          <button id="clearAllWorks" class="text-xs text-white/30 hover:text-red-400 transition">Eliminar todos</button>
        </div>
        <div id="worksList" class="space-y-3">
          <div class="text-center text-white/30 py-10">No hay trabajos todavía</div>
        </div>
      </div>

    </main>
  </div>

  <!-- Mobile sidebar -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>
  <div class="sidebar-mobile p-6 flex flex-col" id="sidebarMobile">
    <div class="flex items-center justify-between mb-8">
      <span class="text-xl font-black tracking-tight">
        <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">LELE</span>
        <span class="opacity-70 font-light">Design</span>
      </span>
      <button id="closeSidebar" class="text-xl opacity-60 hover:opacity-100">&times;</button>
    </div>
    <nav class="flex-1 space-y-1">
      <a href="admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white hover:bg-white/[0.04] text-sm transition-all"><span>👥</span> Usuarios</a>
      <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-600/20 text-amber-300 text-sm font-medium"><span>🖼️</span> Galería</a>
      <a href="admin-licenses.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white hover:bg-white/[0.04] text-sm transition-all"><span>🔑</span> Licencias</a>
    </nav>
    <div class="pt-6 border-t border-white/[0.06] space-y-1">
      <a href="dashboard.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white text-sm transition-all"><span>←</span> Volver</a>
      <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-red-400 text-sm transition-all"><span>🚪</span> Cerrar sesión</a>
    </div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    // ─── Sidebar mobile ─────────────────────────────────
    const menuBtn = document.getElementById('menuBtn');
    const sidebarMobile = document.getElementById('sidebarMobile');
    const sidebarOverlay = document.getElementById('sidebarOverlay');
    const closeSidebar = document.getElementById('closeSidebar');

    function openSidebar() { sidebarMobile.classList.add('open'); sidebarOverlay.classList.add('open'); }
    function closeSidebarFn() { sidebarMobile.classList.remove('open'); sidebarOverlay.classList.remove('open'); }

    menuBtn?.addEventListener('click', openSidebar);
    closeSidebar?.addEventListener('click', closeSidebarFn);
    sidebarOverlay?.addEventListener('click', closeSidebarFn);

    // ─── Theme ──────────────────────────────────────────
    async function checkAdminAccess() {
      const user = JSON.parse(localStorage.getItem('lele_user'));
      if (!user) { window.location.href = 'admin-login.html'; return false; }
      const sb = getSupabaseClient();
      if (sb) {
        const { data: { user: authUser } } = await sb.auth.getUser();
        if (authUser) {
          const { data: profile } = await sb.from('profiles').select('role').eq('id', authUser.id).single();
          if (profile?.role !== 'admin') {
            alert('No tenés permisos de administrador.');
            window.location.href = '../index.html';
            return false;
          }
        }
      }
      return true;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!(await checkAdminAccess())) return;
      leleTheme.applySavedTheme();
      document.getElementById('themeToggleContainer')?.appendChild(leleTheme.createToggle());
      renderWorks();
    });

    // ─── Gestión de trabajos ────────────────────────────
    async function renderWorks() {
      const works = await dbGetWorks();
      const list = document.getElementById('worksList');
      if (works.length === 0) {
        list.innerHTML = '<div class="text-center text-white/30 py-10">No hay trabajos todavía</div>';
        return;
      }
      list.innerHTML = works.map((w, i) => `
        <div class="p-4 rounded-xl glass flex items-center justify-between">
          <div class="flex items-center gap-4">
            <div class="w-14 h-10 rounded-lg" style="background: ${w.image}; background-size: cover; background-position: center;"></div>
            <div>
              <p class="font-medium text-sm">${w.title}</p>
              <span class="text-xs px-2 py-0.5 rounded-full bg-violet-500/10 text-violet-400">${w.category}</span>
            </div>
          </div>
          <button onclick="deleteWork('${w.id || i}')" class="text-xs text-white/30 hover:text-red-400 transition">Eliminar</button>
        </div>
      `).join('');
    }

    async function deleteWork(id) {
      if (!confirm('Eliminar este trabajo?')) return;
      await dbDeleteWork(id);
      renderWorks();
    }

    document.getElementById('clearAllWorks')?.addEventListener('click', async () => {
      if (!confirm('Eliminar todos los trabajos?')) return;
      await dbDeleteAllWorks();
      renderWorks();
    });

    // ─── Upload ─────────────────────────────────────────
    document.getElementById('workForm')?.addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('workTitle').value.trim();
      const description = document.getElementById('workDesc').value.trim();
      const category = document.getElementById('workCategory').value;
      const color = document.getElementById('workColor').value;
      const fileInput = document.getElementById('workImageInput');
      const status = document.getElementById('uploadStatus');

      if (!title) { status.textContent = 'Falta el título'; return; }

      const processImage = async (imageData) => {
        await dbAddWork({ title, description, category, image: imageData });
        document.getElementById('workTitle').value = '';
        document.getElementById('workDesc').value = '';
        fileInput.value = '';
        status.textContent = '✅ Publicado';
        renderWorks();
        setTimeout(() => status.textContent = '', 3000);
      };

      if (fileInput.files.length > 0) {
        const reader = new FileReader();
        reader.onload = (e) => processImage(e.target.result);
        reader.readAsDataURL(fileInput.files[0]);
      } else {
        const gradient = `linear-gradient(135deg, ${color}, ${color}88, #0a0a0f)`;
        processImage(gradient);
      }
    });
  </script>
</body>
</html>
