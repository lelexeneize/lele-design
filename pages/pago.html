<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Comprar — Sabina Optimizer</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/theme.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="font-['Inter']">

  <nav class="fixed top-0 w-full z-50 backdrop-blur-xl border-b border-white/[0.06]" style="background: rgba(10,10,15,0.7);">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      <a href="../index.html" class="flex flex-col justify-center group transition-transform hover:scale-105">
        <div class="text-2xl md:text-[28px] font-black tracking-tighter leading-none flex items-center gap-1.5 drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
          <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-fuchsia-300 bg-clip-text text-transparent">LELE</span>
          <span class="text-cyan-400 font-normal tracking-tight drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">OFICIAL</span>
        </div>
        <span class="text-[10px] font-semibold tracking-[0.25em] text-white/40 mt-1 uppercase pl-0.5">Diseño y Optimizaciones</span>
      </a>
      <a href="optimizer.html" class="text-sm text-white/60 hover:text-white transition">← Volver</a>
    </div>
  </nav>

  <main class="pt-24 pb-20 px-6 max-w-2xl mx-auto">
    <div class="text-center mb-12">
      <h1 class="text-4xl md:text-5xl font-black mb-4 text-white">Completá tu compra</h1>
      <p class="text-white/40" id="planDisplay">Seleccioná un plan para continuar</p>
    </div>

    <div id="planSelector" class="space-y-3 mb-10">
      <div class="mb-6">
        <h2 class="text-lg font-bold text-white mb-3">Sabina Optimizer</h2>
        <div class="space-y-3">
          <button onclick="selectPlan('essential')" class="plan-btn w-full text-left p-5 rounded-2xl border border-white/[0.06] glass-hover transition-all">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-white font-bold">Essential</span>
                <p class="text-white/40 text-sm">12 optimizaciones esenciales</p>
              </div>
              <div class="text-right">
                <p class="text-white font-bold">u$s45</p>
                <p class="text-white/30 text-xs">$45.000 ARS</p>
              </div>
            </div>
          </button>
          <button onclick="selectPlan('pro')" class="plan-btn w-full text-left p-5 rounded-2xl border-violet-500/30 bg-violet-600/10 border transition-all">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-white font-bold">Pro</span>
                <p class="text-white/40 text-sm">Todo Essential + optimización avanzada</p>
              </div>
              <div class="text-right">
                <p class="text-white font-bold">u$s65</p>
                <p class="text-white/30 text-xs">$65.000 ARS</p>
              </div>
            </div>
          </button>
          <button onclick="selectPlan('elite')" class="plan-btn w-full text-left p-5 rounded-2xl border border-white/[0.06] glass-hover transition-all">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-white font-bold">Elite</span>
                <p class="text-white/40 text-sm">Todo Pro + optimización kernel y soporte 30d</p>
              </div>
              <div class="text-right">
                <p class="text-white font-bold">u$s85</p>
                <p class="text-white/30 text-xs">$85.000 ARS</p>
              </div>
            </div>
          </button>
        </div>
      </div>

      <div>
        <h2 class="text-lg font-bold text-white mb-3">Diseño</h2>
        <div class="space-y-3">
          <button onclick="selectPlan('starter')" class="plan-btn w-full text-left p-5 rounded-2xl border border-white/[0.06] glass-hover transition-all">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-white font-bold">Starter</span>
                <p class="text-white/40 text-sm">Diseños IA + logo + flyers</p>
              </div>
              <div class="text-right">
                <p class="text-white font-bold">u$s29</p>
                <p class="text-white/30 text-xs">$35.000 ARS</p>
              </div>
            </div>
          </button>
          <button onclick="selectPlan('designpro')" class="plan-btn w-full text-left p-5 rounded-2xl border-violet-500/30 bg-violet-600/10 border transition-all">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-white font-bold">Pro</span>
                <p class="text-white/40 text-sm">Diseños IA + web + TikTok ilimitado</p>
              </div>
              <div class="text-right">
                <p class="text-white font-bold">u$s79</p>
                <p class="text-white/30 text-xs">$95.000 ARS</p>
              </div>
            </div>
          </button>
          <button onclick="selectPlan('enterprise')" class="plan-btn w-full text-left p-5 rounded-2xl border border-white/[0.06] glass-hover transition-all">
            <div class="flex justify-between items-center">
              <div>
                <span class="text-white font-bold">Enterprise</span>
                <p class="text-white/40 text-sm">Diseños IA + web ilimitadas + gerente dedicado</p>
              </div>
              <div class="text-right">
                <p class="text-white font-bold">u$s199</p>
                <p class="text-white/30 text-xs">$239.000 ARS</p>
              </div>
            </div>
          </button>
        </div>
      </div>
    </div>

    <div id="paymentOptions" class="hidden space-y-4">
      <div class="p-6 rounded-2xl glass text-center">
        <h3 class="text-lg font-bold text-white mb-1" id="summaryPlan">Seleccioná un plan</h3>
        <p class="text-white/40 text-sm mb-6" id="summaryPrice">—</p>
        <div class="flex flex-col sm:flex-row gap-4 justify-center">
          <a id="mpButton" href="#" target="_blank" class="flex-1 px-6 py-4 rounded-full bg-[#00BFFF] hover:bg-[#009ACD] text-white font-bold text-sm transition-all flex items-center justify-center gap-2 shadow-lg shadow-[#00BFFF]/25">
            <i class="fab fa-mercadopago text-lg"></i> Pagar con Mercado Pago
          </a>
          <a id="ppButton" href="#" target="_blank" class="flex-1 px-6 py-4 rounded-full bg-[#0070BA] hover:bg-[#005DA6] text-white font-bold text-sm transition-all flex items-center justify-center gap-2 shadow-lg shadow-[#0070BA]/25">
            <i class="fab fa-paypal text-lg"></i> Pagar con PayPal
          </a>
        </div>
        <p class="text-white/20 text-xs mt-4"><i class="fas fa-lock mr-1"></i> Pago 100% seguro</p>
      </div>
    </div>

    <div class="text-center text-white/20 text-xs mt-8">
      ¿Consultas? Escribinos a <a href="mailto:hola@leledesign.com" class="text-violet-400 hover:text-violet-300">hola@leledesign.com</a>
    </div>
  </main>

  <script>
    const PLANS = {
      essential: { name: 'Sabina Optimizer — Essential', priceUSD: 45, priceARS: 45000, mp: 'https://mpago.la/16LPzvD', pp: 'https://paypal.me/leleballan/45' },
      pro:       { name: 'Sabina Optimizer — Pro',       priceUSD: 65, priceARS: 65000, mp: 'https://mpago.la/2cQ6RDK', pp: 'https://paypal.me/leleballan/65' },
      elite:     { name: 'Sabina Optimizer — Elite',     priceUSD: 85, priceARS: 85000, mp: 'https://mpago.la/1WfM3hA', pp: 'https://paypal.me/leleballan/85' },
      starter:   { name: 'Diseño — Starter',             priceUSD: 29, priceARS: 35000, mp: 'https://mpago.la/32yd9dp', pp: 'https://paypal.me/leleballan/29' },
      designpro: { name: 'Diseño — Pro',                 priceUSD: 79, priceARS: 95000, mp: 'https://mpago.la/1eRVkzL', pp: 'https://paypal.me/leleballan/79' },
      enterprise:{ name: 'Diseño — Enterprise',          priceUSD: 199, priceARS: 239000, mp: 'https://mpago.la/1WxgLEq', pp: 'https://paypal.me/leleballan/199' }
    };

    let selectedPlan = null;

    const urlParams = new URLSearchParams(window.location.search);
    const urlPlan = urlParams.get('plan');
    if (urlPlan && PLANS[urlPlan]) {
      setTimeout(() => selectPlan(urlPlan), 100);
    }

    function selectPlan(plan) {
      selectedPlan = plan;
      const p = PLANS[plan];

      document.querySelectorAll('.plan-btn').forEach((b, i) => {
        const keys = Object.keys(PLANS);
        if (keys[i] === plan) {
          b.classList.add('border-violet-500/30', 'bg-violet-600/10');
          b.classList.remove('border-white/[0.06]');
        } else {
          b.classList.remove('border-violet-500/30', 'bg-violet-600/10');
          b.classList.add('border-white/[0.06]');
        }
      });

      document.getElementById('summaryPlan').textContent = p.name;
      document.getElementById('summaryPrice').textContent = `u$${p.priceUSD} · $${p.priceARS.toLocaleString()} ARS`;
      document.getElementById('mpButton').href = p.mp;
      document.getElementById('mpButton').style.display = p.mp ? 'flex' : 'none';
      document.getElementById('ppButton').href = p.pp;
      document.getElementById('planDisplay').textContent = `Plan seleccionado: ${p.name}`;
      document.getElementById('paymentOptions').classList.remove('hidden');
      // Marcar que el usuario inició un pago (previene acceso directo a pago-exitoso.html)
      localStorage.setItem('payment_initiated', JSON.stringify({ plan, time: Date.now() }));
    }
  </script>
</body>
</html>
