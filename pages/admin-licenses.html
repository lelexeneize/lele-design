<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Licencias — Lele Oficial</title>
  <meta name="description" content="Administrá las licencias de Sabina Optimizer.">
  <meta name="robots" content="noindex, nofollow">
  <style>body { background: #0a0a0f; color: #fff; }</style>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="../js/theme.js"></script>
</head>
<body class="font-['Inter']">
  <script src="https://cdn.tailwindcss.com"></script>

  <div class="fixed left-0 top-0 bottom-0 w-64 sidebar-theme border-r p-6 hidden lg:flex flex-col z-50" style="background: var(--bg-primary);">
    <a href="../index.html" class="text-xl font-black tracking-tight mb-10">
      <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">LELE</span>
      <span class="opacity-70 font-light">Oficial</span>
      <span class="block text-[10px] uppercase tracking-[0.2em] text-amber-400 font-semibold">Admin</span>
    </a>
    <nav class="flex-1 space-y-1">
      <a href="admin.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white hover:bg-white/[0.04] text-sm transition-all"><span>👥</span> Usuarios</a>
      <a href="admin-works.html" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-white hover:bg-white/[0.04] text-sm transition-all"><span>🖼️</span> Galería</a>
      <a href="admin-licenses.html" class="flex items-center gap-3 px-4 py-3 rounded-xl bg-amber-600/20 text-amber-300 text-sm font-medium"><span>🔑</span> Licencias</a>
    </nav>
    <div class="pt-6 border-t border-white/[0.06]">
      <a href="#" onclick="logout()" class="flex items-center gap-3 px-4 py-3 rounded-xl text-white/40 hover:text-red-400 text-sm transition-all"><span>🚪</span> Cerrar sesión</a>
    </div>
  </div>

  <div class="lg:pl-64">
    <header class="h-16 border-b flex items-center justify-between px-6 lg:px-10" style="border-color: var(--border-color);">
      <h2 class="text-lg font-bold">Administrar Licencias — Sabina Optimizer</h2>
      <div id="themeToggleContainer"></div>
    </header>

    <main class="p-6 lg:p-10 space-y-8">

      <!-- Generator -->
      <div class="p-8 rounded-2xl glass max-w-2xl">
        <h3 class="text-lg font-bold mb-1">Generar licencias</h3>
        <p class="text-sm opacity-40 mb-6">Creá keys para Sabina Optimizer</p>
        <div class="space-y-4">
          <div class="flex gap-4">
            <select id="keyPlan" style="background:#1a1a2e;color:white;border:1px solid #2a2a3a;" class="flex-1 px-4 py-3 rounded-xl text-sm focus:outline-none focus:border-violet-500/50">
              <option value="essential" style="background:#1a1a2e;color:white;">Essential</option>
              <option value="pro" style="background:#1a1a2e;color:white;">Pro</option>
              <option value="elite" style="background:#1a1a2e;color:white;">Elite</option>
            </select>
            <input id="keyCount" type="number" value="1" min="1" max="50" style="background:#1a1a2e;color:white;border:1px solid #2a2a3a;" class="w-20 px-4 py-3 rounded-xl text-sm text-center focus:outline-none focus:border-violet-500/50">
          </div>
          <div class="flex items-center gap-4">
            <button onclick="generateKeys()" class="px-8 py-3 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/25">
              Generar keys
            </button>
            <span id="genStatus" class="text-sm opacity-40"></span>
          </div>
        </div>
        <div id="keysOutput" class="mt-4 hidden">
          <label class="text-sm font-medium opacity-60 block mb-2">Keys generadas:</label>
          <textarea id="keysText" rows="5" style="background:#0a0a0f;color:#00ff88;border:1px solid #2a2a3a;" class="w-full px-4 py-3 rounded-xl text-xs font-mono focus:outline-none" readonly></textarea>
          <button onclick="copyKeys()" class="mt-2 px-4 py-2 rounded-full glass text-sm text-white/60 hover:text-white transition">📋 Copiar</button>
        </div>
      </div>

      <!-- Stats -->
      <div class="grid grid-cols-4 gap-4 max-w-3xl">
        <div class="p-5 rounded-2xl glass"><p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-1">Essential</p><p class="text-2xl font-black" id="countEssential">0</p></div>
        <div class="p-5 rounded-2xl glass"><p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-1">Pro</p><p class="text-2xl font-black" id="countPro">0</p></div>
        <div class="p-5 rounded-2xl glass"><p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-1">Elite</p><p class="text-2xl font-black" id="countElite">0</p></div>
        <div class="p-5 rounded-2xl glass" title="Keys que llegaron al límite de activaciones"><p class="text-white/40 text-xs font-medium uppercase tracking-wider mb-1">⚠️ Bloqueadas</p><p class="text-2xl font-black" id="countBlocked">0</p></div>
      </div>

      <!-- Activation list -->
      <div class="p-6 rounded-2xl glass max-w-4xl">
        <div class="flex items-center justify-between mb-4">
          <h3 class="text-lg font-bold">Keys activas</h3>
          <span class="text-xs text-white/40" id="totalKeys">0 keys</span>
        </div>
        <div class="overflow-x-auto">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-white/40 text-xs uppercase tracking-wider border-b border-white/[0.06]">
                <th class="text-left p-3 font-medium">Key</th>
                <th class="text-center p-3 font-medium">Plan</th>
                <th class="text-center p-3 font-medium">Activaciones</th>
                <th class="text-center p-3 font-medium">Estado</th>
                <th class="text-center p-3 font-medium">Creada</th>
              </tr>
            </thead>
            <tbody id="keysTableBody" class="text-white/60"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    function generateLicenseKey(plan) {
      const prefix = plan.substring(0, 2).toUpperCase();
      const segments = [];
      const chars = '0123456789ABCDEF';
      for (let i = 0; i < 4; i++) {
        let seg = '';
        for (let j = 0; j < 6; j++) seg += chars[Math.floor(Math.random() * 16)];
        segments.push(seg);
      }
      return `${prefix}-${segments.join('-')}`;
    }

    async function generateKeys() {
      const plan = document.getElementById('keyPlan').value;
      const count = parseInt(document.getElementById('keyCount').value) || 1;
      const status = document.getElementById('genStatus');
      status.textContent = 'Generando...';

      const token = await getSupabaseToken();

      try {
        const resp = await fetch('/api/create-license', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': `Bearer ${token}` } : {}) },
          body: JSON.stringify({ plan, count })
        });
        const result = await resp.json();
        if (result.keys && result.keys.length > 0) {
          document.getElementById('keysOutput').classList.remove('hidden');
          document.getElementById('keysText').value = result.keys.join('\n');
          status.textContent = `✅ ${result.keys.length} key(s) generadas`;
          loadStats();
        } else {
          status.textContent = '❌ ' + (result.error || 'Error desconocido');
        }
      } catch (e) {
        status.textContent = '❌ ' + e.message;
      }
    }

    function copyKeys() {
      const textarea = document.getElementById('keysText');
      textarea.select();
      document.execCommand('copy');
      document.getElementById('genStatus').textContent = '✅ Copiado';
    }

    async function loadStats() {
      const sb = await getSupabaseClient();
      if (!sb) return;

      const { data } = await sb.from('license_keys').select('plan,status,activated_devices,max_activations');
      if (!data) return;

      document.getElementById('countEssential').textContent = data.filter(k => k.plan === 'essential').length;
      document.getElementById('countPro').textContent = data.filter(k => k.plan === 'pro').length;
      document.getElementById('countElite').textContent = data.filter(k => k.plan === 'elite').length;
      document.getElementById('countBlocked').textContent = data.filter(k => {
        const devs = k.activated_devices || [];
        const max = k.max_activations || 3;
        return devs.length >= max;
      }).length;
      document.getElementById('totalKeys').textContent = data.length + ' keys';

      const tbody = document.getElementById('keysTableBody');
      const sorted = data.sort((a, b) => new Date(b.created_at || 0) - new Date(a.created_at || 0));
      tbody.innerHTML = sorted.map(k => {
        const devs = k.activated_devices || [];
        const max = k.max_activations || 3;
        const blocked = devs.length >= max;
        return `<tr class="border-b border-white/[0.04]">
          <td class="p-3 font-mono text-xs">${k.key?.substring(0, 14)}...</td>
          <td class="text-center p-3"><span class="px-2 py-0.5 rounded-full text-[10px] uppercase ${k.plan === 'pro' ? 'bg-blue-600/20 text-blue-400' : k.plan === 'elite' ? 'bg-violet-600/20 text-violet-400' : 'bg-emerald-600/20 text-emerald-400'}">${k.plan}</span></td>
          <td class="text-center p-3">${blocked ? '🔴 ' : ''}${devs.length}/${max}</td>
          <td class="text-center p-3"><span class="${k.status === 'active' ? 'text-emerald-400' : 'text-red-400'}">${k.status}</span></td>
          <td class="text-center p-3 text-white/30 text-xs">${new Date(k.created_at || Date.now()).toLocaleDateString()}</td>
        </tr>`;
      }).join('');
    }

    async function checkAdminAccess() {
      const user = JSON.parse(localStorage.getItem('lele_user'));
      if (!user) { window.location.href = 'admin-login.html'; return false; }
      const sb = await getSupabaseClient();
      if (!sb) {
        alert('Error de conexión con la base de datos.');
        window.location.href = 'admin-login.html';
        return false;
      }
      try {
        const { data: { user: authUser } } = await sb.auth.getUser();
        if (authUser) {
          const { data: profile } = await sb.from('profiles').select('role').eq('id', authUser.id).single();
          if (profile?.role !== 'admin') {
            alert('No tenés permisos de administrador.');
            window.location.href = '../index.html';
            return false;
          }
          return true;
        }
      } catch (_) {}
      if (user.isAdmin || user.role === 'admin') return true;
      alert('Sesión expirada.');
      window.location.href = 'admin-login.html';
      return false;
    }

    document.addEventListener('DOMContentLoaded', async () => {
      if (!(await checkAdminAccess())) return;
      leleTheme.applySavedTheme();
      document.getElementById('themeToggleContainer')?.appendChild(leleTheme.createToggle());
      loadStats();
    });
  </script>
</body>
</html>
