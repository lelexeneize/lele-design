<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <title>Iniciar sesión — Lele Oficial</title>
  <meta name="description" content="Iniciá sesión en Lele Oficial para acceder a tu cuenta, proyectos y licencias de Sabina Optimizer.">
  <meta property="og:title" content="Iniciar sesión — Lele Oficial">
  <meta property="og:description" content="Accedé a tu cuenta de Lele Oficial.">
  <meta property="og:image" content="https://leleoficial.vercel.app/assets/images/og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="canonical" href="https://leleoficial.vercel.app/pages/login.html">
  <style>body { background: #0a0a0f; color: #fff; }</style>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../js/theme.js"></script>
</head>
<body class="font-['Inter'] min-h-screen flex items-center justify-center">
  <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[100] focus:px-4 focus:py-2 focus:rounded-xl focus:bg-violet-600 focus:text-white focus:text-sm focus:font-semibold">Saltar al contenido principal</a>
  <script src="https://cdn.tailwindcss.com"></script>
  <div class="absolute inset-0 bg-gradient-to-br from-violet-900/20 via-transparent to-fuchsia-900/20"></div>

  <div class="relative z-10 w-full max-w-md mx-6">
    <div class="flex items-center justify-between mb-8">
      <a href="../index.html" class="flex flex-col justify-center group transition-transform hover:scale-105">
        <div class="text-2xl md:text-[28px] font-black tracking-tighter leading-none flex items-center gap-1.5 drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]">
          <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-fuchsia-300 bg-clip-text text-transparent">LELE</span>
          <span class="text-cyan-400 font-normal tracking-tight drop-shadow-[0_0_10px_rgba(34,211,238,0.5)]">OFICIAL</span>
        </div>
        <span class="text-[10px] font-semibold tracking-[0.25em] text-white/40 mt-1 uppercase pl-0.5">Diseño y Optimizaciones</span>
      </a>
      <div id="themeToggleContainer"></div>
    </div>

    <div id="main-content" class="p-8 rounded-2xl glass">
      <h1 class="text-2xl font-bold mb-2">Bienvenido de vuelta</h1>
      <p class="text-white/40 text-sm mb-8">Ingresa a tu cuenta para continuar</p>

      <div id="g_id_onload"
           data-client_id="835547393237-c0n1nfmf8e15gjugisqcgba3bqcq4gi6.apps.googleusercontent.com"
           data-auto_prompt="false"
           data-callback="handleGoogleLogin">
      </div>
      <div class="flex justify-center mb-6">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-locale="es"
             data-width="280">
        </div>
      </div>

      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t" style="border-color: var(--border-color);"></div></div>
        <div class="relative flex justify-center"><span class="px-4 text-xs text-white/30" style="background: var(--bg-primary);">o con email</span></div>
      </div>

      <form class="space-y-5" onsubmit="return false;">
        <div><label class="text-sm font-medium text-white/60 block mb-2">Correo electrónico</label>
          <input id="loginEmail" type="email" placeholder="tu@correo.com" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <div><label class="text-sm font-medium text-white/60 block mb-2">Contraseña</label>
          <input id="loginPassword" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <button type="submit" id="loginBtn" class="w-full py-3 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/25">Iniciar sesión</button>
      </form>
      <p class="text-center text-sm text-white/40 mt-6">¿No tienes cuenta? <a href="register.html" class="text-violet-400 hover:text-violet-300 transition font-medium">Regístrate</a></p>
      <div class="flex justify-center gap-4 mt-4 text-xs text-white/30">
        <a href="privacidad.html" class="hover:text-white/50 transition">Privacidad</a>
        <a href="terminos.html" class="hover:text-white/50 transition">Términos</a>
      </div>
    </div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      leleTheme.applySavedTheme();
      const tc = document.getElementById('themeToggleContainer');
      if (tc && !tc.querySelector('.theme-toggle')) tc.appendChild(leleTheme.createToggle());

      document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const btn = document.getElementById('loginBtn');
        const origText = btn.textContent;

        btn.textContent = 'Ingresando...';
        btn.disabled = true;

        try {
          const sb = await getSupabaseClient();
          if (sb) {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (!error && data.user) {
              localStorage.setItem('lele_user', JSON.stringify({ name: email, email, picture: '' }));
              window.location.href = 'dashboard.html';
              return;
            }
          }
        } catch (_) {}

        btn.textContent = 'Credenciales incorrectas';
        setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
      });
    });
  </script>
</body>
</html>
