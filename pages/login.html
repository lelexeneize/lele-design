<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — Lele Design</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="../js/theme.js"></script>
</head>
<body class="font-['Inter'] min-h-screen flex items-center justify-center">
  <div class="absolute inset-0 bg-gradient-to-br from-violet-900/20 via-transparent to-fuchsia-900/20"></div>

  <div class="relative z-10 w-full max-w-md mx-6">
    <div class="flex items-center justify-between mb-8">
      <a href="../index.html" class="text-2xl font-black tracking-tight">
        <span class="bg-gradient-to-r from-violet-400 via-fuchsia-400 to-cyan-400 bg-clip-text text-transparent">LELE</span>
        <span class="opacity-70 font-light">Design</span>
      </a>
      <div id="themeToggleContainer"></div>
    </div>

    <div class="p-8 rounded-2xl glass">
      <h1 class="text-2xl font-bold mb-2">Bienvenido de vuelta</h1>
      <p class="text-white/40 text-sm mb-8">Ingresa a tu cuenta para continuar</p>

      <div id="g_id_onload"
           data-client_id="835547393237-c0n1nfmf8e15gjugisqcgba3bqcq4gi6.apps.googleusercontent.com"
           data-login_uri=""
           data-auto_prompt="false"
           data-callback="handleGoogleLogin">
      </div>
      <div class="flex justify-center mb-6">
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-locale="es"
             data-width="280">
        </div>
      </div>

      <div class="flex flex-col gap-3 mb-6">
        <button onclick="socialLogin('facebook')" class="w-full py-3 rounded-full bg-[#1877F2] hover:bg-[#166fe5] text-white font-semibold text-sm transition-all flex items-center justify-center gap-3 shadow-lg shadow-[#1877F2]/25">
          <i class="fab fa-facebook-f text-lg"></i> Facebook
        </button>
        <button onclick="socialLogin('apple')" class="w-full py-3 rounded-full bg-white hover:bg-gray-100 text-black font-semibold text-sm transition-all flex items-center justify-center gap-3 shadow-lg">
          <i class="fab fa-apple text-lg"></i> Apple
        </button>
        <p class="text-[10px] text-white/20 text-center">Facebook/Apple requieren habilitarlos en Supabase Dashboard > Authentication > Providers</p>
      </div>

      <div class="relative mb-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t" style="border-color: var(--border-color);"></div></div>
        <div class="relative flex justify-center"><span class="px-4 text-xs text-white/30" style="background: var(--bg-primary);">o con email</span></div>
      </div>

      <form class="space-y-5" onsubmit="return false;">
        <div><label class="text-sm font-medium text-white/60 block mb-2">Correo electrónico</label>
          <input id="loginEmail" type="email" placeholder="tu@correo.com" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <div><label class="text-sm font-medium text-white/60 block mb-2">Contraseña</label>
          <input id="loginPassword" type="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-xl input-theme text-sm focus:outline-none focus:border-violet-500/50 transition-all"></div>
        <button type="submit" id="loginBtn" class="w-full py-3 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 hover:from-violet-500 hover:to-fuchsia-500 text-white font-semibold text-sm transition-all shadow-lg shadow-violet-600/25">Iniciar sesión</button>
      </form>
      <p class="text-center text-sm text-white/40 mt-6">¿No tienes cuenta? <a href="register.html" class="text-violet-400 hover:text-violet-300 transition font-medium">Regístrate</a></p>
    </div>
  </div>

  <script src="../js/supabase-config.js"></script>
  <script src="../js/supabase-db.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    async function socialLogin(provider) {
      try {
        const sb = getSupabaseClient();
        if (sb) {
          const { error } = await sb.auth.signInWithOAuth({ provider });
          if (error) alert('Error al conectar con ' + provider + ': ' + error.message);
        } else {
          alert('Supabase no está configurado');
        }
      } catch (e) {
        // Fallback si el provider no está habilitado en Supabase
        alert('El inicio de sesión con ' + provider + ' no está disponible.\n\nPodés habilitarlo en: Supabase Dashboard > Authentication > Providers');
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      leleTheme.applySavedTheme();
      const tc = document.getElementById('themeToggleContainer');
      if (tc && !tc.querySelector('.theme-toggle')) tc.appendChild(leleTheme.createToggle());

      document.querySelector('form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const btn = document.getElementById('loginBtn');
        const origText = btn.textContent;

        btn.textContent = 'Ingresando...';
        btn.disabled = true;

        // Admin
        if (email === 'admin@leledesign.com' && password === 'admin123') {
          const user = { name: 'Admin', email: 'admin@leledesign.com', picture: '', isAdmin: true };
          localStorage.setItem('lele_user', JSON.stringify(user));
          window.location.href = 'admin-licenses.html';
          return;
        }

        try {
          const sb = getSupabaseClient();
          if (sb) {
            const { data, error } = await sb.auth.signInWithPassword({ email, password });
            if (!error && data.user) {
              localStorage.setItem('lele_user', JSON.stringify({ name: email, email, picture: '' }));
              window.location.href = 'dashboard.html';
              return;
            }
          }
        } catch (_) {}

        btn.textContent = 'Credenciales incorrectas';
        setTimeout(() => { btn.textContent = origText; btn.disabled = false; }, 2000);
      });
    });
  </script>
</body>
</html>
